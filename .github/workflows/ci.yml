name: 🚀 Build Pipeline

on:
  pull_request:
    branches: [main, master, develop, stage]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  push:
    branches: [main, master, develop, stage]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.x.x"
  SOLUTION_PATH: "./Refhub.sln"
  PROJECT_PATH: "./Refhub/Refhub.csproj"
  BUILD_CONFIGURATION: "Release"

jobs: # =====================================
  # 🏗️ BUILD & COMPILE
  # =====================================
  build:
    name: 🏗️ Build & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 📦 Restore Dependencies
        run: |
          echo "🔄 Restoring NuGet packages..."
          dotnet restore ${{ env.SOLUTION_PATH }} --verbosity normal

          # Check if restore was successful by verifying assets file exists
          if [ ! -f "./Refhub/obj/project.assets.json" ]; then
            echo "❌ NuGet restore failed. Assets file not generated."
            echo "🔍 Checking for potential issues..."
            echo "📁 Current directory contents:"
            ls -la
            echo "📁 Refhub directory contents:"
            ls -la ./Refhub/ || echo "Refhub directory not found"
            echo "📁 obj directory contents:"
            ls -la ./Refhub/obj/ || echo "obj directory not found or empty"
            exit 1
          fi
          echo "✅ Dependencies restored successfully!"
          echo "📊 Assets file verified at: ./Refhub/obj/project.assets.json"

      - name: 🏗️ Build Solution (${{ matrix.configuration }})
        run: |
          echo "🔨 Building solution in ${{ matrix.configuration }} mode..."
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration ${{ matrix.configuration }} \
            --no-restore \
            --verbosity normal \
            --property:TreatWarningsAsErrors=false
          echo "✅ Build completed successfully!"

      - name: 📊 Build Summary
        run: |
          echo "🎉 Build Summary for ${{ matrix.configuration }}:"
          echo "================================"
          echo "✅ Solution: Built successfully"
          echo "🔹 Configuration: ${{ matrix.configuration }}"
          echo "🔹 Target Framework: net8.0"
          echo "🔹 Platform: Any CPU"
          echo "================================"
  # =====================================
  # 🐳 DOCKER BUILD & TEST
  # =====================================
  docker:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: [build]
    if: success()
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: refhub
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build Docker Image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t refhub:${{ github.sha }} .
          echo "✅ Docker image built successfully!"

      - name: 🔍 Test Docker Image
        run: |
          echo "🔍 Testing Docker image..."
          # Start container in detached mode
          CONTAINER_ID=$(docker run -d -p 8080:8080 refhub:${{ github.sha }})
          echo "📦 Container started with ID: $CONTAINER_ID"

          # Wait for container to be ready
          echo "⏳ Waiting for container to start..."
          sleep 10

          # Check if container is running
          if docker ps | grep $CONTAINER_ID; then
            echo "✅ Container is running successfully!"
          else
            echo "❌ Container failed to start"
            echo "📋 Container logs:"
            docker logs $CONTAINER_ID
            exit 1
          fi

          # Cleanup
          docker stop $CONTAINER_ID
          docker rm $CONTAINER_ID
          echo "🧹 Container cleaned up"

      - name: 📊 Docker Build Summary
        run: |
          echo "🐳 Docker Build Summary:"
          echo "================================"
          echo "✅ Image: Built successfully"
          echo "🔹 Image Tag: refhub:${{ github.sha }}"
          echo "🔹 Base Image: mcr.microsoft.com/dotnet/aspnet:9.0"
          echo "🔹 Platform: linux/amd64"
          echo "================================"
  # =====================================
  # 📦 PACKAGE & ARTIFACT CREATION
  # =====================================
  package:
    name: 📦 Create Artifacts
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: success()
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 💾 Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 📦 Restore Dependencies for Packaging
        run: |
          echo "🔄 Restoring NuGet packages for packaging..."
          dotnet restore ${{ env.SOLUTION_PATH }} --verbosity normal

          # Verify restore success
          if [ ! -f "./Refhub/obj/project.assets.json" ]; then
            echo "❌ NuGet restore failed during packaging step."
            exit 1
          fi
          echo "✅ Dependencies restored for packaging!"

      - name: 📦 Create Publish Package
        run: |
          echo "📦 Creating deployment package..."
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --output ./publish \
            --no-restore \
            --verbosity normal
          echo "✅ Package created successfully!"

      - name: 📊 Package Information
        run: |
          echo "📦 Package Details:"
          echo "================================"
          echo "📁 Output Directory: ./publish"
          echo "📊 Package Size: $(du -sh ./publish | cut -f1)"
          echo "📄 Files Count: $(find ./publish -type f | wc -l)"
          echo "🔹 Main Assembly: $(find ./publish -name "*.dll" | head -1 | xargs basename)"
          echo "================================"

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: refhub-build-${{ github.run_number }}
          path: ./publish
          retention-days: 7
          compression-level: 6
  # =====================================
  # 📊 FINAL STATUS REPORT
  # =====================================
  status-report:
    name: 📊 Build Status Report
    runs-on: ubuntu-latest
    needs: [build, docker, package]
    if: always()
    timeout-minutes: 5

    steps:
      - name: 📊 Generate Final Report
        run: |
          echo "🎉 BUILD PIPELINE REPORT"
          echo "========================================"
          echo "📅 Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🏷️  Run: #${{ github.run_number }}"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "⚡ Event: ${{ github.event_name }}"
          echo ""          echo "📋 JOB STATUS SUMMARY:"
          echo "========================================"
          echo "🏗️  Build: ${{ needs.build.result }}"
          echo "� Docker: ${{ needs.docker.result }}"
          echo "�📦 Package: ${{ needs.package.result }}"
          echo ""

          # Determine overall status
          if [[ "${{ needs.build.result }}" == "success" && 
                "${{ needs.docker.result }}" == "success" && 
                "${{ needs.package.result }}" == "success" ]]; then
            echo "🎉 OVERALL STATUS: ✅ SUCCESS"
            echo "🚀 Build completed successfully!"
          else
            echo "❌ OVERALL STATUS: ⚠️  FAILED"
            echo "🔧 Please review failed jobs above"
          fi
          echo "========================================"

      - name: 💬 PR Comment (On Failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Build Pipeline Failed
              
              **Build Status**: Failed ❌
              **Run ID**: ${{ github.run_id }}
              **Commit**: ${{ github.sha }}
              
              Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
              
              ### 🔧 Next Steps:
              - Review the failed job logs
              - Fix any compilation errors
              - Ensure dependencies are properly restored
              
              ---
              *This comment was automatically generated by the build pipeline* 🤖`
            })

      - name: 💬 PR Comment (On Success)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Build Pipeline Successful
              
              **Build Status**: Passed ✅
              **Run ID**: ${{ github.run_id }}
              **Commit**: ${{ github.sha }}
                ### 🎉 Build Completed:
              - ✅ Build successful (Debug & Release)
              - ✅ Docker image built and tested
              - ✅ Artifacts created
              
              **Ready for review and merge!** 🚀
              
              ---
              *This comment was automatically generated by the build pipeline* 🤖`
            })

# =====================================
# 🔧 WORKFLOW CONFIGURATION NOTES
# =====================================
# This simplified workflow provides:
# ✅ Multi-configuration builds (Debug/Release)
# ✅ Docker image build and testing
# ✅ NuGet package caching for faster builds
# ✅ Artifact generation and upload
# ✅ Automatic PR comments
# ✅ Detailed job summaries
# ✅ Timeout protection
# ✅ Conditional execution based on file changes
